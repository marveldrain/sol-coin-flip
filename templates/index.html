<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FLIPX • marveldrainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', system-ui; background: #0a0a0a; }
    .neon-text { text-shadow: 0 0 20px #22ff88, 0 0 40px #22ff88, 0 0 60px #ff00ff; }
    .coin { box-shadow: 0 0 80px #22ff88, inset 0 0 40px rgba(255,255,255,0.6); }
    .coin.flipping { animation: ultraFlip 1.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
    @keyframes ultraFlip { 0% { transform: rotateY(0deg) rotateX(0deg); } 100% { transform: rotateY(2520deg) rotateX(1080deg); } }
    .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px); }
  </style>
</head>
<body class="min-h-screen text-emerald-400 pb-12 relative overflow-hidden">
  <div class="absolute inset-0 bg-[linear-gradient(#22ff8822_1px,transparent_1px),linear-gradient(90deg,#22ff8822_1px,transparent_1px)] bg-[size:30px_30px]"></div>

  <div class="max-w-[420px] mx-auto p-4 relative z-10">
    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center gap-2">
        <div class="text-4xl">🎲</div>
        <h1 class="text-5xl font-bold neon-text tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">FLIPX</h1>
      </div>
    </div>

    <!-- Deposit -->
    <div class="glass rounded-3xl p-6 mb-6">
      <div class="text-xs tracking-widest mb-2">YOUR DEPOSIT ADDRESS</div>
      <div onclick="copyAddress()" id="depositAddr" class="bg-black p-4 rounded-2xl font-mono text-sm break-all cursor-pointer">Click to generate</div>
      <div class="text-[10px] text-emerald-300/70 mt-2">Send SOL here • Use memo if shown</div>
    </div>

    <!-- Balance -->
    <div class="glass rounded-3xl p-4 flex justify-between items-center mb-8">
      <div>BALANCE: <span id="userBalance" class="text-2xl text-emerald-300 font-mono">0.00</span> SOL</div>
      <button onclick="refreshBalance()" class="text-xs border border-emerald-400 px-4 py-2 rounded-xl">REFRESH</button>
    </div>

    <!-- Coin -->
    <div class="relative flex justify-center mb-10">
      <div id="coin" onclick="placeFlip(null)" class="coin w-64 h-64 bg-gradient-to-br from-yellow-300 to-amber-500 rounded-full border-8 border-yellow-200 flex items-center justify-center text-7xl cursor-pointer">
        <div id="coinFace" class="font-black text-black">⟳</div>
      </div>
    </div>

    <!-- Bet -->
    <div class="glass rounded-3xl p-6 border border-emerald-500/30">
      <div class="text-xs tracking-[2px] mb-3 text-emerald-300">BET AMOUNT</div>
      <div class="flex items-center bg-black rounded-2xl p-1 mb-6">
        <input id="amount" type="number" value="0.1" step="0.05" min="0.01" class="flex-1 bg-transparent text-5xl font-mono text-center outline-none text-emerald-400">
        <div class="text-emerald-400 pr-6">SOL</div>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-6">
        <button onclick="placeFlip(true)" id="headsBtn" class="h-20 bg-gradient-to-b from-emerald-400 to-teal-600 rounded-3xl text-2xl font-bold active:scale-95">HEADS</button>
        <button onclick="placeFlip(false)" id="tailsBtn" class="h-20 bg-gradient-to-b from-pink-500 to-rose-600 rounded-3xl text-2xl font-bold active:scale-95">TAILS</button>
      </div>

      <button onclick="placeFlip(null)" class="w-full py-6 bg-white text-black rounded-3xl text-xl font-bold flex items-center justify-center gap-3 active:scale-95">
        <i class="fa-solid fa-bolt text-2xl"></i> LAUNCH FLIP
      </button>
    </div>

    <div class="flex justify-between text-[10px] mt-8 text-emerald-300/70 px-2">
      <div>LIVE FEED</div>
      <div onclick="showProvable()" class="cursor-pointer">PROVABLY FAIR ✓</div>
    </div>

    <div id="history" class="mt-4 space-y-2 text-sm"></div>
  </div>

  <audio id="flipSound" src="https://freesound.org/data/previews/276/276951_5123854-lq.mp3"></audio>
  <audio id="winSound" src="https://freesound.org/data/previews/387/387186_7258994-lq.mp3"></audio>

  <script>
    let userId = localStorage.getItem('flipx_userid') || Math.random().toString(36).substring(2, 15);
    localStorage.setItem('flipx_userid', userId);

    async function init() {
      const resp = await fetch('/get_deposit_address', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id: userId})
      });
      const data = await resp.json();
      document.getElementById('depositAddr').textContent = data.deposit_address;
    }

    async function refreshBalance() {
      const resp = await fetch('/balance', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id: userId})
      });
      const data = await resp.json();
      document.getElementById('userBalance').textContent = data.balance_sol;
    }

    async function placeFlip(choice) {
      const amount = parseFloat(document.getElementById('amount').value);
      if (amount <= 0) return alert("Bet > 0");

      document.getElementById('headsBtn').disabled = true;
      document.getElementById('tailsBtn').disabled = true;

      document.getElementById('flipSound').play();

      const coin = document.getElementById('coin');
      const coinFace = document.getElementById('coinFace');
      coin.classList.add('flipping');
      coinFace.innerHTML = '⟳';

      const resp = await fetch('/flip', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id: userId, amount_sol: amount, choice: choice !== null ? (choice ? 'heads' : 'tails') : null})
      });
      const data = await resp.json();

      setTimeout(() => {
        coin.classList.remove('flipping');
        coinFace.textContent = data.result === 'heads' ? 'H' : 'T';

        if (data.error) {
          alert(data.error);
        } else {
          const panel = document.createElement('div');
          panel.className = `fixed bottom-8 left-4 right-4 glass rounded-3xl p-8 text-center z-50`;
          panel.innerHTML = `
            <div class="text-5xl mb-4">${data.won ? '🎉 YOU WIN' : 'HOUSE WINS'}</div>
            <div class="text-4xl ${data.won ? 'text-emerald-400' : 'text-rose-400'}">${data.won ? '+' : '-'}${data.payout_sol || amount} SOL</div>
            <button onclick="this.parentElement.remove(); resetButtons()" class="mt-6 px-8 py-3 border border-emerald-400 rounded-2xl text-sm">NEXT FLIP</button>
          `;
          document.body.appendChild(panel);

          if (data.won) {
            document.getElementById('winSound').play();
            confetti({particleCount: 400, spread: 100});
          }
          refreshBalance();
          addToHistory(data);
        }
        resetButtons();
      }, 1500);
    }

    function resetButtons() {
      document.getElementById('headsBtn').disabled = false;
      document.getElementById('tailsBtn').disabled = false;
    }

    function addToHistory(data) {
      const hist = document.getElementById('history');
      const entry = document.createElement('div');
      entry.className = `flex justify-between p-4 glass rounded-2xl ${data.won ? 'border-l-4 border-emerald-400' : 'border-l-4 border-rose-400'}`;
      entry.innerHTML = `<span>${data.result.toUpperCase()}</span><span class="${data.won?'text-emerald-400':'text-rose-400'}">${data.won?'+':'-'}${(data.payout_sol || 0).toFixed(2)}</span>`;
      hist.prepend(entry);
    }

    function copyAddress() {
      const addr = document.getElementById('depositAddr').textContent;
      navigator.clipboard.writeText(addr);
      alert("Address copied! Send SOL to it.");
    }

    function showProvable() {
      alert("Provably fair using server seed + user ID + blockhash.");
    }

    // Boot
    init();
    refreshBalance();
    setInterval(refreshBalance, 15000);
  </script>
</body>
</html>
